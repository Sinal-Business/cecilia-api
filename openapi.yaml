openapi: 3.1.0
info:
  title: Cecilia API
  version: "2.0.0"

servers:
  - url: https://chat-gdatabot.onrender.com

security:
  - BearerAuth: []

paths:
  /validations/document:
    post:
      operationId: validateDocument
      tags:
        - Validações
      summary: Valida CPF ou CNPJ
      description: Valida documentos CPF e CNPJ, incluindo formato, quantidade de caracteres e dígitos verificadores.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ValidateDocumentRequest"
            examples:
              cpf:
                summary: Validação de CPF
                value:
                  tipo: cpf
                  valor: "12345678909"
              cnpj:
                summary: Validação de CNPJ
                value:
                  tipo: cnpj
                  valor: "12345678000195"
      responses:
        "200":
          description: Resultado da validação do documento
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidateDocumentResponse"
              examples:
                validCpf:
                  summary: CPF válido
                  value:
                    ok: true
                    documento_original: "12345678909"
                    documento_valido: true
                    tipo_documento: CPF
                    status_documento: VALID_CPF
                    motivo_invalido: ""
                invalidCpf:
                  summary: CPF inválido
                  value:
                    ok: true
                    documento_original: "123.456.789-09"
                    documento_valido: false
                    tipo_documento: CPF
                    status_documento: INVALID_CPF_FORMAT
                    motivo_invalido: CPF deve conter apenas números, sem pontos, traços, letras ou espaços
        "403":
          description: Token inválido
        "422":
          description: Erro de validação do payload

  /adm/client-charge:
    patch:
      operationId: atualizarCobrancaCliente
      tags:
        - Adm
      summary: Atualizar Cobrança de Cliente
      description: |
        Atualiza os campos de cobrança gerenciados pelo webhook BotConversa em
        dbo.sinal_financeiro_hiscobranca, localizando os registros por contato.
        O contato pode vir com +, espaços, hífens ou parênteses; o backend
        normaliza o valor para somente números antes da busca.

        Somente os campos abaixo podem ser alterados por este endpoint:
        - status
        - resposta
        - dt_projecao_pgto
        dt_cobranca é preenchida automaticamente pelo backend com a data e hora
        atual de São Paulo sempre que a atualização é processada.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateClientChargeRequest"
            examples:
              botconversa:
                summary: Atualização enviada pelo BotConversa
                value:
                  contato: "+5521999999999"
                  status: Atual (Com Projeção)
                  resposta: Cliente informou previsão de pagamento.
                  dt_projecao_pgto: "2026-06-30"
      responses:
        "200":
          description: Cobrança atualizada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateClientChargeResponse"
              examples:
                updated:
                  summary: Atualização realizada
                  value:
                    ok: true
                    updated_count: 1
                    contato: "5521999999999"
        "400":
          description: Nenhum campo de cobrança informado
        "403":
          description: Token inválido ou ausente
        "404":
          description: Nenhuma cobrança encontrada para o filtro informado
        "422":
          description: Erro de validação do payload
        "503":
          description: Falha ao atualizar a cobrança

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ValidateDocumentRequest:
      type: object
      required:
        - tipo
        - valor
      properties:
        tipo:
          type: string
          description: Tipo do documento a validar.
          enum:
            - cpf
            - cnpj
          example: cpf
        valor:
          type: string
          description: Valor do documento sem pontuação.
          example: "12345678909"

    ValidateDocumentResponse:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        documento_original:
          type: string
          example: "12345678909"
        documento_valido:
          type: boolean
          example: true
        tipo_documento:
          type: string
          example: CPF
        status_documento:
          type: string
          example: VALID_CPF
          enum:
            - VALID_CPF
            - INVALID_CPF_EMPTY
            - INVALID_CPF_FORMAT
            - INVALID_CPF_LENGTH
            - INVALID_CPF_DIGITS
            - VALID_CNPJ
            - INVALID_CNPJ_EMPTY
            - INVALID_CNPJ_FORMAT
            - INVALID_CNPJ_LENGTH
            - INVALID_CNPJ_DIGITS
            - INVALID_DOCUMENT_TYPE
        motivo_invalido:
          type: string
          example: ""

    UpdateClientChargeRequest:
      type: object
      required:
        - contato
        - status
      properties:
        contato:
          type: string
          minLength: 1
          maxLength: 40
          description: Valor usado para localizar a cobrança; aceita + e pontuação, mas será normalizado para números.
          example: "+5521999999999"
        status:
          type: string
          minLength: 1
          maxLength: 255
          description: Novo status da cobrança.
          example: Atual (Com Projeção)
        resposta:
          anyOf:
            - type: string
              maxLength: 2000
            - type: "null"
          description: Resposta ou observação retornada pelo cliente.
          example: Cliente informou previsão de pagamento.
        dt_projecao_pgto:
          anyOf:
            - type: string
              format: date
            - type: "null"
          description: Data projetada de pagamento no formato YYYY-MM-DD.
          example: "2026-06-30"

    UpdateClientChargeResponse:
      type: object
      required:
        - ok
        - updated_count
        - contato
      properties:
        ok:
          type: boolean
          description: Indica se a atualização foi processada.
          example: true
        updated_count:
          type: integer
          description: Quantidade de cobranças atualizadas.
          example: 1
        contato:
          type: string
          description: Contato usado no filtro.
          example: "5521999999999"
